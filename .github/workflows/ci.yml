name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest --ignore=tests/integration --cov=saas_pipeline --cov-report=term-missing
      - name: Delta integration test
        run: uv run pytest tests/integration
